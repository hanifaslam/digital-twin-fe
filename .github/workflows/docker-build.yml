name: Build and Push Docker Image

on:
  push:
    branches:
      - staging

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        run: |
          docker build \
            --no-cache \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_DISABLE_CSRF=${{ vars.NEXT_PUBLIC_DISABLE_CSRF }} \
            -t ghcr.io/${{ github.repository }}:staging .
          docker push ghcr.io/${{ github.repository }}:staging

      - name: Trigger Coolify Deploy
        run: |
          curl -X POST "https://coolify.hanifaslam.dev/api/v1/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"uuid":"xg9tal49ob4ekinanmssa9iq","force":true}'
