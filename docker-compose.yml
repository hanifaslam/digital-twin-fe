version: '3.8'

services:
  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_API_URL=https://digital-twin.page/api
        - NEXT_PUBLIC_DISABLE_CSRF=true
    container_name: nextjs_app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://digital-twin.page/api
    ports:
      - '3000:3000'
